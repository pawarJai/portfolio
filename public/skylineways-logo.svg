<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skylineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Skyline Buildings -->
  <g id="skyline">
    <!-- Building 1 -->
    <rect x="5" y="35" width="8" height="20" fill="url(#skylineGradient)" opacity="0.8">
      <animate attributeName="height" values="20;25;20" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Building 2 -->
    <rect x="15" y="25" width="10" height="30" fill="url(#skylineGradient)" opacity="0.9">
      <animate attributeName="height" values="30;35;30" dur="4s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Building 3 (tallest) -->
    <rect x="27" y="15" width="12" height="40" fill="url(#skylineGradient)">
      <animate attributeName="height" values="40;45;40" dur="5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Building 4 -->
    <rect x="41" y="30" width="9" height="25" fill="url(#skylineGradient)" opacity="0.85">
      <animate attributeName="height" values="25;30;25" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Building 5 -->
    <rect x="52" y="20" width="11" height="35" fill="url(#skylineGradient)" opacity="0.9">
      <animate attributeName="height" values="35;40;35" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Neural Network Connections -->
  <g id="connections" opacity="0.6">
    <line x1="10" y1="25" x2="20" y2="15" stroke="#60A5FA" stroke-width="1" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="15" x2="33" y2="10" stroke="#60A5FA" stroke-width="1" opacity="0.7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="33" y1="10" x2="45" y2="20" stroke="#60A5FA" stroke-width="1" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="45" y1="20" x2="58" y2="12" stroke="#60A5FA" stroke-width="1" opacity="0.7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Data Points -->
  <g id="dataPoints">
    <circle cx="10" cy="25" r="2" fill="#3B82F6">
      <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="15" r="2" fill="#1E40AF">
      <animate attributeName="r" values="1.5;3;1.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="33" cy="10" r="2" fill="#60A5FA">
      <animate attributeName="r" values="1.5;3;1.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="20" r="2" fill="#1E40AF">
      <animate attributeName="r" values="1.5;3;1.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="58" cy="12" r="2" fill="#3B82F6">
      <animate attributeName="r" values="1.5;3;1.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Company Text -->
  <text x="75" y="25" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="url(#textGradient)">
    SKYLINE
  </text>
  <text x="75" y="45" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="300" fill="url(#textGradient)" opacity="0.9">
    WAYS
  </text>
  
  <!-- Subtle glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow)" opacity="0.3">
    <rect x="5" y="35" width="8" height="20" fill="#3B82F6"/>
    <rect x="15" y="25" width="10" height="30" fill="#3B82F6"/>
    <rect x="27" y="15" width="12" height="40" fill="#3B82F6"/>
    <rect x="41" y="30" width="9" height="25" fill="#3B82F6"/>
    <rect x="52" y="20" width="11" height="35" fill="#3B82F6"/>
  </g>
</svg>